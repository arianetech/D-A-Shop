<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Se connecter — D&A.Shop</title>
  <link rel="stylesheet" href="css/login.css">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css" rel="stylesheet">
</head>

<body>

  <canvas id="stars"></canvas>

  <!-- HEADER -->
  <header>
    <a href="index.html" class="logo">
      <div class="logo-mark">D&A</div>
      <span class="logo-text">D&A.Shop</span>
    </a>
    <a href="register.html" class="btn-header">
      <i class="ri-user-add-line"></i> Créer un compte
    </a>
  </header>

  <!-- MAIN -->
  <main>
    <div class="auth-card">

      <!-- En-tête carte -->
      <div class="auth-card-header">
        <div class="auth-icon">
          <i class="ri-user-line"></i>
        </div>
        <h1>Bon retour</h1>
        <p>Connectez-vous à votre espace D&A.Shop</p>
      </div>

      <!-- Formulaire -->
      <form id="loginForm" onsubmit="handleLogin(event)">

        <div class="form-group">
          <label for="email">
            <i class="ri-mail-line"></i> Adresse e-mail
          </label>
          <input type="email" id="email" name="email" placeholder="vous@exemple.cm" autocomplete="email" required>
        </div>

        <div class="form-group">
          <div class="label-row">
            <label for="password">
              <i class="ri-lock-line"></i> Mot de passe
            </label>
            <!--<a href="#" class="forgot-link">Mot de passe oublié ?</a>-->
          </div>
          <div class="input-password-wrap">
            <input type="password" id="password" name="password" autocomplete="current-password" required>
            <button type="button" class="toggle-pw" onclick="togglePw('password', this)" tabindex="-1">
              <i class="ri-eye-off-line"></i>
            </button>
          </div>
        </div>

        <!-- Message retour -->
        <div class="msg msg-error" id="msgError">
          <i class="ri-close-circle-line"></i>
          <span id="msgErrorText">Email ou mot de passe incorrect.</span>
        </div>
        <div class="msg msg-success" id="msgSuccess">
          <i class="ri-checkbox-circle-line"></i>
          Connexion réussie ! Redirection en cours…
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">
          <span class="btn-label">
            <i class="ri-login-box-line"></i> Se connecter
          </span>
          <span class="btn-loader" style="display:none">
            <i class="ri-loader-4-line spin"></i> Connexion…
          </span>
        </button>

      </form>

      <!-- Lien vers inscription -->
      <p class="auth-switch">
        Pas encore de compte ?
        <a href="register.html">Créer un compte <i class="ri-arrow-right-line"></i></a>
      </p>

    </div>
  </main>

  <!-- FOOTER -->
  <footer>
    <span>© 2026 D&A.Shop · Cameroun</span>
    <div class="footer-links">
      <a href="contact.html">Contact</a>
    </div>
  </footer>

  <script>
    /* ===== STARFIELD ===== */
    const canvas = document.getElementById('stars');
    const ctx = canvas.getContext('2d');
    let stars = [];
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    function initStars() {
      stars = [];
      const n = Math.floor((canvas.width * canvas.height) / 7000);
      for (let i = 0; i < n; i++) stars.push({
        x: Math.random() * canvas.width, y: Math.random() * canvas.height,
        r: Math.random() * 1.2 + 0.2, speed: Math.random() * 0.004 + 0.001,
        phase: Math.random() * Math.PI * 2
      });
    }
    function drawStars(t) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (const s of stars) {
        const a = 0.2 + 0.7 * Math.abs(Math.sin(s.phase + t * s.speed));
        ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${a})`; ctx.fill();
      }
      requestAnimationFrame(drawStars);
    }
    resize(); initStars(); requestAnimationFrame(drawStars);
    window.addEventListener('resize', () => { resize(); initStars(); });

    /* ===== TOGGLE MOT DE PASSE ===== */
    function togglePw(id, btn) {
      const input = document.getElementById(id);
      const isText = input.type === 'text';
      input.type = isText ? 'password' : 'text';
      btn.querySelector('i').className = isText ? 'ri-eye-off-line' : 'ri-eye-line';
    }

    /* ===== SUBMIT ===== */
    function handleLogin(e) {
      e.preventDefault();
      const label = document.querySelector('.btn-label');
      const loader = document.querySelector('.btn-loader');
      const btn = document.getElementById('submitBtn');
      const err = document.getElementById('msgError');
      const ok = document.getElementById('msgSuccess');

      err.classList.remove('show');
      ok.classList.remove('show');
      label.style.display = 'none';
      loader.style.display = 'flex';
      btn.disabled = true;

      // Simulation appel API
      setTimeout(() => {
        loader.style.display = 'none';
        label.style.display = 'flex';
        btn.disabled = false;

        const email = document.getElementById('email').value;
        const pw = document.getElementById('password').value;

        if (email && pw.length >= 6) {
          ok.classList.add('show');
          setTimeout(() => { window.location.href = 'da-shop.html'; }, 1500);
        } else {
          err.classList.add('show');
          document.getElementById('msgErrorText').textContent = 'Le mot de passe doit contenir au moins 6 caractères.';
        }
      }, 1400);
    }
  </script>

</body>

</html>
